<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід | Є-Бюджет</title>
    <meta name="description" content="Є-Бюджет — сервіс для абітурієнтів. Зручний пошук пропозицій ВНЗ, відстеження рейтингових списків та розрахунок шансів на вступ.">

    <meta name="author" content="Bezukh Danylo">
    <link rel="stylesheet" href="./css/login.css">
    <link rel="apple-touch-icon" sizes="180x180" href="./images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./images/favicon/favicon-16x16.png">
    <link rel="manifest" href="./images/favicon/site.webmanifest">
</head>
<body>
<header>
    <h1>Є-Бюджет — Адмін-панель</h1>
</header>
<main class="login-container">
    <section class="login-card">
        <h2>Авторизація</h2>
        <form id="login-form">
            <label for="username">Логін:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" required>

            <button type="submit" class="form-full-width">Увійти</button>
        </form>
    </section>
</main>

<div id="toast" class="toast hidden">
    <span class="toast-icon" id="toast-icon"></span>
    <span id="toast-message"></span>
</div>

<script type="module" src="./js/common/main.js"></script>
</body>
</html>
